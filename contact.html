<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Nirvana Biotech</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="topnav">
  <div class="topnav-inner">
    <a href="index.html" class="brand">
      <img data-brand-logo class="brand-mark" src="" alt="Nirvana Biotech logo">
      <div>
        <div class="brand-text" data-brand-name></div>
        <div class="brand-sub" data-brand-sub></div>
      </div>
    </a>
    <div class="navlinks" data-navlinks></div>
    <button class="nav-toggle" aria-label="Open menu">
      <svg width="18" height="14" viewBox="0 0 18 14"><path d="M0 1H18M0 7H18M0 13H18" stroke="#F7F5EF" stroke-width="1.4"/></svg>
    </button>
  </div>
  <div class="mobile-menu" data-navlinks></div>
</nav>

<aside class="rail" data-rail></aside>

<main>
  <section class="hero page-fade" style="padding-bottom:3rem;">
    <div class="shell">
      <div class="eyebrow hero-eyebrow">GET IN TOUCH</div>
      <h1 id="contact-title">Connect With Our Labs</h1>
      <p class="lede" id="contact-desc" style="margin-top:1.6rem;"></p>
      <div class="hero-trace" data-trace data-trace-h="60"></div>
    </div>
  </section>

  <section class="section">
    <div class="shell">
      <form class="form-grid" onsubmit="handleFormSubmit(event)">
        <div class="form-row">
          <div>
            <label for="cf-name">Sender name</label>
            <input id="cf-name" type="text" placeholder="Dr. John Doe" required>
          </div>
          <div>
            <label for="cf-email">Institutional email</label>
            <input id="cf-email" type="email" placeholder="partner@institution.org" required>
          </div>
        </div>
        <div>
          <label for="cf-subject">Subject</label>
          <input id="cf-subject" type="text" placeholder="Partnership inquiry" required>
        </div>
        <div>
          <label for="cf-message">Message</label>
          <textarea id="cf-message" rows="5" placeholder="Outline your inquiry or proposal here..." required></textarea>
        </div>
        <button type="submit" class="btn btn--solid" style="width:fit-content;">Send message</button>
      </form>
    </div>
  </section>
</main>

<footer>
  <div class="shell">
    <div class="footer-grid">
      <div class="footer-col">
        <h4>Nirvana Biotech</h4>
        <p style="max-width:28ch;">Translational research bridging veterinary discovery and human therapeutics.</p>
      </div>
      <div class="footer-col">
        <h4>Site</h4>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="innovations.html">Innovations</a>
        <a href="team.html">Team</a>
        <a href="research.html">Research</a>
        <a href="contact.html">Contact</a>
      </div>
      <div class="footer-col">
        <h4>Contact</h4>
        <a href="mailto:info@nirvanabiotech.org">info@nirvanabiotech.org</a>
      </div>
    </div>
    <div class="footer-bottom">
      <span>&copy; 2026 Nirvana Biotech Inc. All rights reserved.</span>
      <span>Registered Scientific Entity</span>
    </div>
  </div>
</footer>

<script src="site.js"></script>
<script>
  function renderPage(data){
    buildNav('contact');
    const c = data.contact;
    if (!c) return;
    document.getElementById('contact-title').textContent = c.title || 'Connect With Our Labs';
    document.getElementById('contact-desc').textContent = c.desc || '';
  }
  function handleFormSubmit(e){
    e.preventDefault();
    alert('Message sent. Thank you — our team will be in touch shortly.');
    e.target.reset();
  }
</script>
</body>
</html>
