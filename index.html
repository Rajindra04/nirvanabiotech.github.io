    <style>
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.4s ease-out forwards; }
        .nav-link { transition: all 0.3s ease; position: relative; }
        .nav-link::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background-color: #0ea5e9; transition: width 0.3s ease; }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }
        .nav-link.active { color: #0ea5e9; font-weight: 600; }

        .admin-editable-active { position: relative; min-width: 40px; min-height: 20px; display: inline-block; }
        .admin-editable-active:hover { background-color: rgba(14, 165, 233, 0.08); outline: 2px dashed #0ea5e9; outline-offset: 4px; border-radius: 4px; }

        .editable-image { position: relative; display: inline-block; overflow: hidden; cursor: default; }
        .admin-image-active { cursor: pointer !important; }
        .admin-image-active::before {
            content: "📸 Upload Image";
            position: absolute; inset: 0; background: rgba(15, 23, 42, 0.7);
            color: white; font-size: 13px; font-weight: 500;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.2s ease; pointer-events: none; z-index: 10;
        }
        .admin-image-active:hover::before { opacity: 1; }

        .section-bg { background-size: cover; background-position: center; background-repeat: no-repeat; transition: background-image 0.4s ease-in-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        #admin-toolbar { position: fixed; bottom: 20px; right: 20px; z-index: 60; display: none; flex-direction: column; gap: 8px; background: rgba(15, 23, 42, 0.95); padding: 14px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.25); }
        #admin-toolbar.visible { display: flex; }
        #login-modal-backdrop { position: fixed; inset: 0; background: rgba(15,23,42,0.6); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
        #login-modal-backdrop.visible { display: flex; }
    </style>

    <script>
        // ==================== CONFIG ====================
        const REPO_OWNER = "Rajindra04";
        const REPO_NAME = "nirvanabiotech.github.io";
        const CONTENT_PATH = "content.json";
        const IMAGES_DIR = "public/images";

        let githubToken = localStorage.getItem("github_pat") || "";
        let isAuthenticated = false;

        // ==================== GITHUB API ====================
        async function githubRequest(endpoint, options = {}) {
            const res = await fetch(`https://api.github.com${endpoint}`, {
                headers: {
                    Authorization: `token ${githubToken}`,
                    Accept: "application/vnd.github.v3+json"
                },
                ...options
            });
            if (!res.ok) throw new Error(`GitHub Error: ${res.status}`);
            return res.json();
        }

        async function getFile() {
            try {
                const data = await githubRequest(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/${CONTENT_PATH}`);
                return { content: JSON.parse(atob(data.content)), sha: data.sha };
            } catch {
                return { content: { textData: {}, imageRefs: {}, backgroundRefs: {}, dynamicGrids: {} }, sha: null };
            }
        }

        async function updateFile(content, sha) {
            await githubRequest(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/${CONTENT_PATH}`, {
                method: "PUT",
                body: JSON.stringify({
                    message: `Update ${new Date().toISOString()}`,
                    content: btoa(JSON.stringify(content, null, 2)),
                    sha,
                    branch: "main"
                })
            });
        }

        // ==================== IMAGE UPLOAD ====================
        async function uploadImage(file) {
            const { blob } = await processImageFile(file);
            const filename = `${Date.now()}-${file.name.replace(/[^a-z0-9.]/gi, '')}`;
            const path = `${IMAGES_DIR}/${filename}`;

            const reader = new FileReader();
            return new Promise((resolve, reject) => {
                reader.onload = async () => {
                    try {
                        const base64 = reader.result.split(',')[1];
                        const res = await githubRequest(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
                            method: "PUT",
                            body: JSON.stringify({ message: `Upload ${filename}`, content: base64, branch: "main" })
                        });
                        resolve({ key: filename, url: res.content.download_url });
                    } catch (e) { reject(e); }
                };
                reader.readAsDataURL(blob);
            });
        }

        function processImageFile(file) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                const reader = new FileReader();
                reader.onload = e => img.src = e.target.result;
                img.onload = () => {
                    let w = img.width, h = img.height;
                    const max = 1600;
                    if (w > max || h > max) {
                        const scale = max / Math.max(w, h);
                        w = Math.round(w * scale); h = Math.round(h * scale);
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    canvas.toBlob(b => resolve({ blob: b }), 'image/jpeg', 0.85);
                };
                reader.readAsDataURL(file);
            });
        }

        // ==================== DATA FUNCTIONS (from your original) ====================
        function getDataObject() {
            const textData = {};
            document.querySelectorAll('[id].editable').forEach(el => textData[el.id] = el.innerHTML);

            const imageRefs = {};
            document.querySelectorAll('img[data-img-key]').forEach(img => {
                imageRefs[img.id || img.closest('.editable-image')?.id] = { key: img.getAttribute('data-img-key'), url: img.src };
            });

            const backgroundRefs = {};
            document.querySelectorAll('.section-bg').forEach(sec => {
                if (sec.id && sec.getAttribute('data-bg-key')) {
                    backgroundRefs[sec.id] = {
                        key: sec.getAttribute('data-bg-key'),
                        url: sec.getAttribute('data-bg-url'),
                        light: sec.getAttribute('data-bg-light') === 'true'
                    };
                }
            });

            const dynamicGrids = {};
            ['innovations-grid','team-grid','research-grid'].forEach(id => {
                const grid = document.getElementById(id);
                if (grid) dynamicGrids[id] = Array.from(grid.children).filter(c => !c.hasAttribute('data-default-id')).map(c => c.outerHTML);
            });

            return { textData, imageRefs, backgroundRefs, dynamicGrids };
        }

        function applyDataObject(data) {
            // Apply text, grids, images, backgrounds (same logic as your nirvana.html)
            if (data.textData) Object.entries(data.textData).forEach(([id, html]) => {
                const el = document.getElementById(id); if (el) el.innerHTML = html;
            });
            // ... (add the rest of your applyDataObject logic if needed)
        }

        async function loadSiteContent() {
            const { content } = await getFile();
            applyDataObject(content);
        }

        async function saveSiteContent() {
            const data = getDataObject();
            const { sha } = await getFile();
            await updateFile(data, sha);
            flashSaveStatus("✅ Saved to GitHub");
        }

        function flashSaveStatus(msg) {
            const el = document.getElementById('save-status');
            el.textContent = msg;
            setTimeout(() => el.textContent = "Changes saved to GitHub", 2000);
        }

        // ==================== UI FUNCTIONS (from your original) ====================
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('#nav-menu a').forEach(a => a.classList.toggle('active', a.getAttribute('onclick').includes(id)));
        }

        function toggleAdminMode() {
            if (!isAuthenticated) {
                document.getElementById('login-modal-backdrop').classList.add('visible');
            } else {
                signOutAdmin();
            }
        }

        function handlePATLogin() {
            const token = document.getElementById('pat-input').value.trim();
            if (!token) return;
            githubToken = token;
            localStorage.setItem('github_pat', token);
            isAuthenticated = true;
            closeLoginModal();
            updateAdminUI(true);
            loadSiteContent();
        }

        function closeLoginModal() {
            document.getElementById('login-modal-backdrop').classList.remove('visible');
        }

        function signOutAdmin() {
            localStorage.removeItem('github_pat');
            githubToken = '';
            isAuthenticated = false;
            updateAdminUI(false);
        }

        function updateAdminUI(active) {
            document.querySelectorAll('.editable').forEach(el => {
                el.contentEditable = active;
                el.classList.toggle('admin-editable-active', active);
            });
            document.querySelectorAll('.editable-image').forEach(el => el.classList.toggle('admin-image-active', active));
            document.querySelectorAll('.admin-btn').forEach(btn => btn.classList.toggle('hidden', !active));
            document.getElementById('admin-toolbar').classList.toggle('visible', active);
        }

        // Image & Background handlers (adapted)
        document.addEventListener('click', e => {
            if (!isAuthenticated) return;
            const wrapper = e.target.closest('.editable-image');
            if (wrapper) {
                const img = wrapper.querySelector('img');
                if (img) triggerImageUpload(img);
            }
        });

        async function triggerImageUpload(imgElement) {
            const input = document.createElement('input');
            input.type = 'file'; input.accept = 'image/*';
            input.onchange = async () => {
                const file = input.files[0];
                if (!file) return;
                try {
                    const { key, url } = await uploadImage(file);
                    imgElement.setAttribute('data-img-key', key);
                    imgElement.src = url;
                    await saveSiteContent();
                } catch (err) { alert("Upload failed: " + err.message); }
            };
            input.click();
        }

        function changeBackground(sectionId, light) {
            // Similar to triggerImageUpload but for background
            // Implement same as your original but using uploadImage()
        }

        // Add new item functions (copy from your nirvana.html and call saveSiteContent() at the end)

        function manualSave() { saveSiteContent(); }

        // INIT
        window.onload = async () => {
            document.getElementById('content-loading').style.display = 'none';
            if (githubToken) {
                isAuthenticated = true;
                updateAdminUI(true);
            }
            await loadSiteContent();
            showSection('home');
        };

        // Expose functions
        window.showSection = showSection;
        window.toggleAdminMode = toggleAdminMode;
        window.handlePATLogin = handlePATLogin;
        window.closeLoginModal = closeLoginModal;
        window.signOutAdmin = signOutAdmin;
        window.manualSave = manualSave;
        window.changeBackground = changeBackground;
        window.addNewInnovationItem = addNewInnovationItem;
        window.addNewTeamMember = addNewTeamMember;
        window.addNewResearchItem = addNewResearchItem;
    </script>
