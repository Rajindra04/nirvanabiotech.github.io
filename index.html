    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.4s ease-out forwards; }
        .nav-link { transition: all 0.3s ease; position: relative; }
        .nav-link::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background-color: #0ea5e9; transition: width 0.3s ease; }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }
        .nav-link.active { color: #0ea5e9; font-weight: 600; }

        .admin-editable-active { position: relative; min-width: 40px; min-height: 20px; display: inline-block; }
        .admin-editable-active:hover { background-color: rgba(14, 165, 233, 0.08); outline: 2px dashed #0ea5e9; outline-offset: 4px; border-radius: 4px; }

        .editable-image { position: relative; display: inline-block; overflow: hidden; cursor: default; }
        .admin-image-active { cursor: pointer !important; }
        .admin-image-active::before {
            content: "📸 Upload Image";
            position: absolute; inset: 0; background: rgba(15, 23, 42, 0.7);
            color: white; font-size: 13px; font-weight: 500;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.2s ease; pointer-events: none; z-index: 10;
        }
        .admin-image-active:hover::before { opacity: 1; }

        .section-bg { background-size: cover; background-position: center; background-repeat: no-repeat; transition: background-image 0.4s ease-in-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        #admin-toolbar { position: fixed; bottom: 20px; right: 20px; z-index: 60; display: none; flex-direction: column; gap: 8px; background: rgba(15, 23, 42, 0.95); padding: 14px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.25); }
        #admin-toolbar.visible { display: flex; }
        #login-modal-backdrop { position: fixed; inset: 0; background: rgba(15,23,42,0.6); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
        #login-modal-backdrop.visible { display: flex; }
        #content-loading.hidden { display: none; }
    </style>
</head>
