<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nirvana Biotech | Pioneering Life Sciences</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.4s ease-out forwards; }
        .nav-link { transition: all 0.3s ease; position: relative; }
        .nav-link::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background-color: #0ea5e9; transition: width 0.3s ease; }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }
        .nav-link.active { color: #0ea5e9; font-weight: 600; }
        .section-bg { background-size: cover; background-position: center; background-repeat: no-repeat; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="font-sans bg-slate-50 text-slate-800 flex flex-col min-h-screen">

    <!-- Navigation -->
    <nav class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="showSection('home')">
                <img id="logo-img" src="images/logo.png" class="h-12 w-12 object-cover rounded-xl" alt="Logo">
                <div>
                    <span id="logo-text" class="text-xl font-bold text-slate-900">NIRVANA</span>
                    <p id="logo-sub" class="text-xs font-semibold text-sky-600 uppercase">BIOTECH</p>
                </div>
            </div>
            
            <div class="hidden md:flex items-center gap-8 text-sm font-medium text-slate-600" id="nav-menu">
                <a href="#" onclick="showSection('home')" class="nav-link active">Home</a>
                <a href="#" onclick="showSection('about')" class="nav-link">About</a>
                <a href="#" onclick="showSection('innovations')" class="nav-link">Innovations</a>
                <a href="#" onclick="showSection('team')" class="nav-link">Team</a>
                <a href="#" onclick="showSection('research')" class="nav-link">Research</a>
                <a href="#" onclick="showSection('contact')" class="nav-link">Contact</a>
            </div>

            <div>
                <button onclick="openAdminLogin()" class="text-xs px-3 py-1 border border-slate-300 rounded hover:bg-slate-50">ADMIN</button>
            </div>
        </div>
    </nav>

    <main class="flex-grow">
        <!-- Home -->
        <section id="home" class="section active py-32 section-bg min-h-[80vh] flex items-center relative" style="background-image: url('images/home-bg.jpg');">
            <div class="max-w-5xl mx-auto px-6 text-center">
                <h1 id="home-title" class="text-5xl font-black text-slate-950">Welcome to Nirvana Biotech</h1>
                <p id="home-subtitle" class="text-xl text-slate-600 mt-4">Leading the way with Translational research and innovation</p>
            </div>
        </section>

        <!-- About, Innovations, Team, Research, Contact sections can be added similarly -->
        <!-- For now, this minimal version will show content -->
    </main>

    <script>
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            const section = document.getElementById(id);
            if (section) section.classList.add('active');
        }

        function openAdminLogin() {
            alert("Admin login will be restored in the next update.");
            // You can add the full login modal later
        }

        // Load data and render
        async function init() {
            try {
                const res = await fetch('data.json?v=' + Date.now());
                const data = await res.json();
                
                // Basic rendering
                document.getElementById('logo-text').textContent = data.brandName || "NIRVANA";
                document.getElementById('logo-sub').textContent = data.brandSub || "BIOTECH";
                document.getElementById('home-title').textContent = data.home?.title || "Welcome to Nirvana Biotech";
                document.getElementById('home-subtitle').textContent = data.home?.subtitle || "";
            } catch (e) {
                console.error("Failed to load data:", e);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
